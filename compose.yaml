services:
  db:
    image: mysql:8.4
    container_name: mysql_gimnasio_v2
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: gimnasio_db
    ports:
      - "3308:3306"
    volumes:
      - mysql_data_gimnasio_v2:/var/lib/mysql

  liquibase:
    image: liquibase/liquibase:latest
    container_name: liquibase_gimnasio_v2
    depends_on:
      - db
    volumes:
      - ./:/liquibase/changelog
    working_dir: /liquibase/changelog
    command:
      - --defaultsFile=liquibase.properties
      - update

volumes:
  mysql_data_gimnasio_v2:
